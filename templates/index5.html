<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddha Multilingual AI Engine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">

    <style>
        body {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            font-family: system-ui, sans-serif;
        }

        .card {
            border: 1px solid #ccc;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .hidden {
            display: none;
        }

        .active-mic {
            background-color: #ff4d4d !important;
            color: white;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .mcq-btn {
            padding: 12px;
            font-size: 1em;
            text-align: left;
            background: #f0f4f8;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            color: #1e293b;
        }

        .mcq-btn:hover {
            background: #e2e8f0;
            transform: translateX(4px);
        }

        .status-text {
            color: #64748b;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>🌿 Siddha Prakriti Multilingual Assistant</h1>
    <p>Voice & Click Interface with Gemini Mapping and XAI Analytics</p>
    <hr>

    <div id="setup-card" class="card">
        <h3>📋 Patient Intake & Language Setup</h3>

        <label>Full Name / பெயர்:</label>
        <input type="text" id="patient-name" placeholder="Enter patient name" required>

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Age / வயது:</label>
                <input type="number" id="patient-age" placeholder="Age" min="1">
            </div>

            <div style="flex: 1;">
                <label>Gender / பாலினம்:</label>
                <select id="patient-gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <label>Location / ஊர்:</label>
        <input type="text" id="patient-location" placeholder="City / Town Name">

        <h3>Select Preferred Diagnostic Language:</h3>
        <select id="lang-selector" style="font-size: 1.1em;">
            <option value="en-US">English</option>
            <option value="ta-IN">தமிழ் (Tamil)</option>
            <option value="ml-IN">മലയാളം (Malayalam)</option>
        </select>

        <br><br>

        <button id="start-btn" onclick="startSession()" style="width: 100%;">
            Begin Diagnostic Evaluation
        </button>
    </div>

    <div id="interview-card" class="card hidden">
        <h3 id="question-number">Question 1 of 18</h3>

        <p id="feature-name" style="color:#2563eb; font-weight:bold;"></p>

        <p id="question-prompt" style="font-size: 1.25em; font-weight: bold;"></p>

        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="mic-btn" onclick="toggleListening()">
                🎙️ Speak / பேசுக / സംസാരിക്കുക
            </button>

            <p id="speech-preview" class="status-text"></p>
        </div>

        <div id="options-box" class="options-container"></div>

        <p id="processing-status" class="status-text"></p>
    </div>

    <audio id="global-audio-player" style="display: none;"></audio>

        let currentStep = 0;
        let selectedLang = "en-US";
        let questions = [];
        let mappedAnswers = [];
        let demographicProfile = {};
        let recognition;
        let isListening = false;

        function startSession() {
            const name = document.getElementById("patient-name").value.trim();

            if (!name) {
                alert("Please input patient name.");
                return;
            }

            demographicProfile = {
                name: name,
                age: document.getElementById("patient-age").value || "N/A",
                gender: document.getElementById("patient-gender").value,
                location: document.getElementById("patient-location").value || "N/A"
            };

            currentStep = 0;
            mappedAnswers = [];

            selectedLang = document.getElementById("lang-selector").value;
            questions = localizedDataset[selectedLang];

            document.getElementById("setup-card").classList.add("hidden");
            document.getElementById("interview-card").classList.remove("hidden");

            setupSpeechRecognition();

            loadQuestion();
        }

        function setupSpeechRecognition() {
            if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = selectedLang;

                recognition.onresult = async function(event) {
                    const transcript = event.results[0][0].transcript;

                    document.getElementById("speech-preview").innerText =
                        `Heard: "${transcript}"`;

                    stopMicUI();

                    await processAnswer(
                        transcript,
                        "speech_or_text",
                        ""
                    );
                };

                recognition.onerror = function(event) {
                    stopMicUI();
                    document.getElementById("speech-preview").innerText =
                        "Speech recognition error. Please try again or click an option.";
                };

                recognition.onend = function() {
                    stopMicUI();
                };
            } else {
                document.getElementById("mic-btn").disabled = true;
                document.getElementById("mic-btn").innerText =
                    "Speech not supported in this browser";
            }
        }

        async function triggerBackendVoice(textToSpeak) {
            const res = await fetch("/speak_prompt", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    text: textToSpeak,
                    language: selectedLang
                })
            });

            const data = await res.json();

            if (data.success) {
                const player = document.getElementById("global-audio-player");
                player.src = data.audio_url;
                player.play().catch(e => console.log(e));
            }
        }

        function loadQuestion() {
            if (currentStep < questions.length) {
                const q = questions[currentStep];

                document.getElementById("question-number").innerText =
                    `Question ${currentStep + 1} of ${questions.length}`;

                document.getElementById("feature-name").innerText =
                    `Feature: ${q.feature}`;

                document.getElementById("question-prompt").innerText =
                    q.prompt;

                document.getElementById("speech-preview").innerText = "";
                document.getElementById("processing-status").innerText = "";

                const optionsBox = document.getElementById("options-box");
                optionsBox.innerHTML = "";

                const optionLetters = ["A", "B", "C"];

                q.options.forEach((optionText, index) => {
                    const optionLetter = optionLetters[index];

                    const btn = document.createElement("button");
                    btn.className = "mcq-btn";
                    btn.innerHTML = `<b>${optionLetter}.</b> ${optionText}`;

                    btn.onclick = async () => {
                        if (isListening && recognition) {
                            recognition.stop();
                        }

                        await processAnswer(
                            optionText,
                            "option_click",
                            optionLetter
                        );
                    };

                    optionsBox.appendChild(btn);
                });

                triggerBackendVoice(q.prompt);
            } else {
                evaluateSession();
            }
        }

        function toggleListening() {
            if (!recognition) {
                alert("Speech recognition is not supported in this browser.");
                return;
            }

            if (!isListening) {
                isListening = true;
                document.getElementById("mic-btn").classList.add("active-mic");
                document.getElementById("speech-preview").innerText =
                    "Listening...";

                recognition.start();
            } else {
                recognition.stop();
            }
        }

        function stopMicUI() {
            isListening = false;
            document.getElementById("mic-btn").classList.remove("active-mic");
        }

        async function processAnswer(text, inputMode, selectedOption) {
            document.getElementById("processing-status").innerText =
                "Mapping your response...";

            const response = await fetch("/parse_response", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    question_number: currentStep + 1,
                    input_mode: inputMode,
                    speech_text: text,
                    selected_option: selectedOption,
                    language: selectedLang
                })
            });

            const result = await response.json();

            if (!result.success) {
                alert("Could not process answer: " + result.error);
                document.getElementById("processing-status").innerText = "";
                return;
            }

            mappedAnswers.push(result.mapped_answer);

            currentStep++;

            setTimeout(loadQuestion, 500);
        }

        async function evaluateSession() {
            document.getElementById("interview-card").innerHTML =
                "<h3>Processing 18 Siddha features... Generating Random Forest prediction and real LIME explanation... Please wait.</h3>";

            const response = await fetch("/predict_prakriti", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    mapped_answers: mappedAnswers,
                    demographics: demographicProfile,
                    language: selectedLang
                })
            });

            const finalData = await response.json();

            if (finalData.success) {
                window.location.href = finalData.redirect;
            } else {
                document.getElementById("interview-card").innerHTML =
                    `<h3>Error</h3><p>${finalData.error}</p>`;
            }
        }
    </script>
